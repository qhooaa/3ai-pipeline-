<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="말씀정복">
<title>수빈의 말씀정복</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f1eb;
    --surface: #faf8f4;
    --surface-alt: #efeae2;
    --border: #ddd6c8;
    --border-focus: #7a8c6e;
    --text: #3a372e;
    --text-dim: #8a847a;
    --text-light: #b8b0a4;
    --accent: #7a8c6e;
    --accent-deep: #5e6e52;
    --accent-soft: #a4b498;
    --accent-glow: rgba(122, 140, 110, 0.1);
    --warm: #e8e2d6;
    --tag-meditation: rgba(122, 140, 110, 0.15);
    --tag-meditation-text: #5e6e52;
    --tag-prayer: rgba(180, 155, 120, 0.15);
    --tag-prayer-text: #8a7050;
    --shadow: 0 2px 12px rgba(58, 55, 46, 0.05);
    --shadow-lg: 0 6px 24px rgba(58, 55, 46, 0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.7;
    background-image:
      radial-gradient(circle at 20% 80%, rgba(122, 140, 110, 0.06) 0%, transparent 50%),
      radial-gradient(circle at 80% 20%, rgba(200, 180, 140, 0.06) 0%, transparent 50%);
  }

  .container {
    max-width: 520px;
    margin: 0 auto;
    padding: 40px 24px 100px;
  }

  /* ── Header ── */
  .header { text-align: center; margin-bottom: 28px; }
  .header-leaf {
    font-size: 18px;
    margin-bottom: 10px;
    opacity: 0.5;
  }
  .header .app-label {
    font-family: 'DM Serif Display', serif;
    font-size: 13px;
    font-style: italic;
    color: var(--accent);
    letter-spacing: 2px;
    margin-bottom: 6px;
  }
  .header h1 {
    font-family: 'Gowun Batang', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 2px;
    margin-bottom: 4px;
  }
  .header h1 .name { color: var(--accent-deep); }
  .header .sub {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
  }
  .header .date-line {
    font-size: 11px;
    color: var(--text-light);
    margin-top: 8px;
  }

  /* ── Mode Tabs ── */
  .mode-tabs {
    display: flex;
    margin-bottom: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 4px;
    box-shadow: var(--shadow);
  }
  .mode-tab {
    flex: 1;
    padding: 10px 0;
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
    color: var(--text-dim);
    background: transparent;
    border: none;
    border-radius: 24px;
    cursor: pointer;
    transition: all 0.3s;
  }
  .mode-tab.active {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 2px 8px rgba(122, 140, 110, 0.3);
  }
  .mode-tab:not(.active):hover {
    color: var(--accent);
    background: var(--accent-glow);
  }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
    transition: border-color 0.3s;
  }
  .card:focus-within { border-color: var(--border-focus); }
  .card-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--accent);
    margin-bottom: 14px;
  }

  /* ── Testament tabs ── */
  .testament-tabs { display: flex; gap: 8px; margin-bottom: 12px; }
  .tab-btn {
    flex: 1;
    padding: 8px 0;
    font-size: 12px;
    font-weight: 500;
    font-family: inherit;
    color: var(--text-dim);
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab-btn.active {
    background: var(--warm);
    color: var(--accent-deep);
    border-color: var(--accent-soft);
  }

  /* ── Book select ── */
  .book-select {
    width: 100%;
    padding: 10px 14px;
    font-size: 13px;
    font-family: inherit;
    color: var(--text);
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: 10px;
    appearance: none;
    cursor: pointer;
    margin-bottom: 12px;
  }

  /* ── Verse inputs ── */
  .verse-row {
    display: flex;
    align-items: center;
    gap: 6px;
    overflow: hidden;
  }
  .verse-input {
    flex: 1;
    min-width: 0;
    padding: 10px 4px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: 10px;
    text-align: center;
    -moz-appearance: textfield;
  }
  .verse-input::-webkit-outer-spin-button,
  .verse-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .verse-input:focus { outline: none; border-color: var(--accent); }
  .verse-separator { color: var(--text-light); font-size: 14px; flex-shrink: 0; }
  .verse-hint { font-size: 10px; color: var(--text-light); margin-top: 8px; }

  /* ── Prayer input ── */
  .prayer-textarea {
    width: 100%;
    min-height: 120px;
    padding: 16px;
    font-size: 13px;
    font-family: inherit;
    color: var(--text);
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: 12px;
    resize: vertical;
    line-height: 1.8;
    transition: border-color 0.3s;
  }
  .prayer-textarea:focus { outline: none; border-color: var(--accent); }
  .prayer-textarea::placeholder { color: var(--text-light); }

  /* ── Submit button ── */
  .submit-btn {
    width: 100%;
    padding: 14px;
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    color: #fff;
    letter-spacing: 1px;
    background: var(--accent);
    border: none;
    border-radius: 28px;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(122, 140, 110, 0.25);
    transition: all 0.3s;
  }
  .submit-btn:hover { background: var(--accent-deep); transform: translateY(-1px); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* ── Status ── */
  .status-bar {
    text-align: center;
    font-size: 12px;
    margin-top: 8px;
    min-height: 20px;
    color: var(--text-dim);
  }
  .status-bar.error { color: #b85454; }
  .status-bar.success { color: var(--accent-deep); }

  /* ── Loading ── */
  .loading-animation {
    display: none;
    text-align: center;
    padding: 48px 20px;
  }
  .loading-animation.visible { display: block; }
  .loading-icon {
    font-size: 36px;
    animation: floatBook 2s ease-in-out infinite;
  }
  @keyframes floatBook {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  .loading-text {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 12px;
  }

  /* ── Result ── */
  .result-box {
    display: none;
    margin-top: 16px;
    animation: fadeUp 0.5s ease;
  }
  .result-box.visible { display: block; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: var(--shadow-lg);
  }
  .result-title {
    font-family: 'Gowun Batang', serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--accent-deep);
    padding: 16px 20px 0;
  }
  .result-content {
    padding: 12px 20px 20px;
    font-size: 13.5px;
    line-height: 1.85;
    color: var(--text);
    word-break: keep-all;
  }
  .result-content strong { color: var(--accent-deep); font-weight: 700; }
  .result-content .section-head {
    display: block;
    font-family: 'Gowun Batang', serif;
    font-weight: 700;
    font-size: 14px;
    color: var(--accent-deep);
    margin-top: 20px;
    margin-bottom: 6px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
  }
  .result-content .verse-ref {
    font-family: 'Gowun Batang', serif;
    color: var(--accent);
    font-weight: 700;
    font-size: 13px;
  }
  .result-actions {
    display: flex;
    border-top: 1px solid var(--border);
  }
  .action-btn {
    flex: 1;
    padding: 12px;
    font-size: 13px;
    font-family: inherit;
    color: var(--text-dim);
    background: transparent;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
  }
  .action-btn:first-child { border-right: 1px solid var(--border); }
  .action-btn:hover { background: var(--surface-alt); color: var(--accent); }

  /* ── Back button ── */
  .back-btn {
    display: none;
    width: 100%;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 28px;
    background: var(--surface);
    color: var(--text-dim);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    margin-bottom: 16px;
    text-align: center;
    transition: all 0.2s;
  }
  .back-btn.visible { display: block; }
  .back-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Timeline ── */
  .timeline-section { margin-top: 32px; }
  .timeline-title {
    font-size: 12px;
    font-weight: 500;
    color: var(--accent);
    margin-bottom: 16px;
  }
  .timeline-list { list-style: none; }
  .timeline-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 4px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.2s;
    border-radius: 6px;
  }
  .timeline-item:hover { background: var(--accent-glow); }
  .timeline-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent-soft);
    margin-top: 7px;
    flex-shrink: 0;
  }
  .timeline-item:first-child .timeline-dot { background: var(--accent); }
  .timeline-body { flex: 1; min-width: 0; }
  .timeline-verse {
    font-family: 'Gowun Batang', serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
  }
  .timeline-type {
    display: inline-block;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 8px;
    margin-left: 6px;
    font-weight: 500;
    vertical-align: middle;
  }
  .timeline-type.meditation { background: var(--tag-meditation); color: var(--tag-meditation-text); }
  .timeline-type.prayer { background: var(--tag-prayer); color: var(--tag-prayer-text); }
  .timeline-summary {
    font-size: 12px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
  }
  .timeline-date { font-size: 11px; color: var(--text-light); white-space: nowrap; }
  .timeline-clear { text-align: center; margin-top: 8px; }
  .timeline-clear-btn {
    font-size: 11px;
    color: var(--text-light);
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
    font-family: inherit;
  }
  .timeline-empty {
    text-align: center;
    font-size: 12px;
    color: var(--text-light);
    padding: 24px 0;
  }

  /* ── Pagination ── */
  .pagination {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
    margin-top: 14px;
    padding: 4px 0;
  }
  .page-btn {
    width: 32px; height: 32px;
    font-size: 13px;
    font-family: inherit;
    font-weight: 500;
    color: var(--text-dim);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .page-btn:hover { border-color: var(--accent-soft); color: var(--accent); }
  .page-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    box-shadow: 0 2px 8px rgba(122, 140, 110, 0.25);
  }
  .page-btn.nav {
    font-size: 11px;
    color: var(--text-light);
    width: auto;
    padding: 0 10px;
  }
  .page-btn.nav:hover { color: var(--accent); }

  /* ── Mode sections ── */
  .mode-section { display: none; }
  .mode-section.active { display: block; }

  /* ── Responsive ── */
  @media (max-width: 400px) {
    .container { padding: 28px 18px 80px; }
    .card { padding: 20px 18px; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="header-leaf">🌿</div>
    <div class="app-label">daily devotion</div>
    <h1><span class="name">수빈</span>의 말씀정복</h1>
    <div class="sub">말씀으로 기도하는 습관</div>
    <div class="date-line" id="dateLine"></div>
  </div>

  <!-- Mode Tabs -->
  <div class="mode-tabs">
    <button class="mode-tab active" id="tabMeditation">📖 말씀묵상</button>
    <button class="mode-tab" id="tabPrayer">🙏 기도근거</button>
  </div>

  <!-- ═══════ Input Area ═══════ -->
  <div id="inputArea">

    <!-- 말씀묵상 모드 -->
    <div class="mode-section active" id="meditationMode">
      <div class="card">
        <div class="card-label">📖 성경 구절</div>
        <div class="testament-tabs">
          <button class="tab-btn active" id="tabOT">구약</button>
          <button class="tab-btn" id="tabNT">신약</button>
        </div>
        <select class="book-select" id="bookSelect">
          <option value="">성경을 선택하세요</option>
        </select>
        <div class="verse-row">
          <input class="verse-input" id="chapter" type="number" min="1" placeholder="장">
          <span class="verse-separator">:</span>
          <input class="verse-input" id="verseStart" type="number" min="1" placeholder="시작절">
          <span class="verse-separator">~</span>
          <input class="verse-input" id="verseEnd" type="number" min="1" placeholder="끝절">
        </div>
        <div class="verse-hint">* 끝절을 비우면 1절만 묵상해요</div>
      </div>
      <button class="submit-btn" id="meditationBtn">묵상 시작하기</button>
    </div>

    <!-- 기도근거 모드 -->
    <div class="mode-section" id="prayerMode">
      <div class="card">
        <div class="card-label">🙏 말씀에서 기도의 근거를 찾아드릴게요</div>
        <textarea class="prayer-textarea" id="prayerTopic" placeholder="어떤 상황에서 무엇을 구하고 싶은지 자유롭게 적어주세요&#10;&#10;예) 직장에서 지혜를 달라고 기도하고 싶어요&#10;예) 아이가 건강하게 자라도록 기도하고 싶어요&#10;예) 사업이 잘 되게 해달라고 기도하고 싶어요"></textarea>
      </div>
      <button class="submit-btn" id="prayerBtn">기도 근거 찾기</button>
    </div>

    <div class="status-bar" id="statusBar"></div>
  </div>

  <!-- Loading -->
  <div class="loading-animation" id="loadingAnim">
    <div class="loading-icon" id="loadingIcon">📖</div>
    <div class="loading-text" id="loadingText">말씀을 묵상하고 있어요...</div>
  </div>

  <!-- Back button -->
  <button class="back-btn" id="backBtn">← 돌아가기</button>

  <!-- Result -->
  <div class="result-box" id="resultBox">
    <div class="result-card">
      <div class="result-title" id="resultTitle">📖 묵상 가이드</div>
      <div class="result-content" id="resultContent"></div>
      <div class="result-actions">
        <button class="action-btn" id="copyBtn">📋 복사하기</button>
        <button class="action-btn" id="shareBtn">💌 공유하기</button>
      </div>
    </div>
  </div>

  <!-- Timeline -->
  <div class="timeline-section" id="timelineSection">
    <div class="timeline-title">📝 나의 기록</div>
    <ul class="timeline-list" id="timelineList"></ul>
  </div>

</div>

<script>
// ═══════ CONFIG ═══════
var MEDITATION_WEBHOOK = 'https://kimbombo.app.n8n.cloud/webhook/bible-guide';
var PRAYER_WEBHOOK = 'https://kimbombo.app.n8n.cloud/webhook/bible-prayer';

var currentMode = 'meditation';
var currentPage = 1;
var PAGE_SIZE = 10;

// ═══════ Bible Data ═══════
var otBooks = ['창세기','출애굽기','레위기','민수기','신명기','여호수아','사사기','룻기','사무엘상','사무엘하','열왕기상','열왕기하','역대상','역대하','에스라','느헤미야','에스더','욥기','시편','잠언','전도서','아가','이사야','예레미야','예레미야애가','에스겔','다니엘','호세아','요엘','아모스','오바댜','요나','미가','나훔','하박국','스바냐','학개','스가랴','말라기'];
var ntBooks = ['마태복음','마가복음','누가복음','요한복음','사도행전','로마서','고린도전서','고린도후서','갈라디아서','에베소서','빌립보서','골로새서','데살로니가전서','데살로니가후서','디모데전서','디모데후서','디도서','빌레몬서','히브리서','야고보서','베드로전서','베드로후서','요한일서','요한이서','요한삼서','유다서','요한계시록'];

// ═══════ Date ═══════
function showDate() {
  var d = new Date();
  var days = ['일','월','화','수','목','금','토'];
  document.getElementById('dateLine').textContent =
    d.getFullYear() + '년 ' + (d.getMonth()+1) + '월 ' + d.getDate() + '일 ' + days[d.getDay()] + '요일';
}

// ═══════ Mode Switch ═══════
function switchMode(mode) {
  currentMode = mode;
  document.getElementById('tabMeditation').classList.toggle('active', mode === 'meditation');
  document.getElementById('tabPrayer').classList.toggle('active', mode === 'prayer');
  document.getElementById('meditationMode').classList.toggle('active', mode === 'meditation');
  document.getElementById('prayerMode').classList.toggle('active', mode === 'prayer');
  document.getElementById('resultBox').classList.remove('visible');
  document.getElementById('statusBar').className = 'status-bar';
  document.getElementById('statusBar').textContent = '';
}

// ═══════ Testament / Book Select ═══════
function populateBooks(testament) {
  var sel = document.getElementById('bookSelect');
  sel.innerHTML = '<option value="">성경을 선택하세요</option>';
  var list = testament === 'nt' ? ntBooks : otBooks;
  list.forEach(function(b) {
    var o = document.createElement('option');
    o.value = b; o.textContent = b;
    sel.appendChild(o);
  });
}

function switchTestament(t) {
  document.getElementById('tabOT').classList.toggle('active', t === 'ot');
  document.getElementById('tabNT').classList.toggle('active', t === 'nt');
  populateBooks(t);
}

// ═══════ Status ═══════
function setStatus(type, msg) {
  var bar = document.getElementById('statusBar');
  bar.textContent = msg;
  bar.className = 'status-bar ' + type;
}

// ═══════ Format Result ═══════
function formatResult(text) {
  if (!text) return '';
  text = text.replace(/\*\*/g, '');
  text = text.replace(/^(\d+)\.\s*(.+)$/gm, function(m, num, title) {
    return '<span class="section-head">' + num + '. ' + title + '</span>';
  });
  text = text.replace(/[【\[]([\uAC00-\uD7A3a-zA-Z0-9\s]+\d+:\d+(?:-\d+)?)[】\]]/g, function(m, ref) {
    return '<span class="verse-ref">📖 ' + ref + '</span>';
  });
  text = text.replace(/→\s*(.+)/g, '→ <strong>$1</strong>');
  text = text.replace(/\n/g, '<br>');
  return text;
}

// ═══════ Submit Meditation ═══════
async function submitMeditation() {
  var book = document.getElementById('bookSelect').value;
  var ch = document.getElementById('chapter').value;
  var vStart = document.getElementById('verseStart').value;
  var vEnd = document.getElementById('verseEnd').value;

  if (!book) { setStatus('error', '성경을 선택해주세요'); return; }
  if (!ch) { setStatus('error', '장을 입력해주세요'); return; }
  if (!vStart) { setStatus('error', '시작절을 입력해주세요'); return; }

  var verseLabel = book + ' ' + ch + ':' + vStart;
  if (vEnd && parseInt(vEnd) > parseInt(vStart)) verseLabel += '-' + vEnd;

  var btn = document.getElementById('meditationBtn');
  btn.disabled = true;
  btn.textContent = '묵상 준비 중...';
  setStatus('', '');
  document.getElementById('resultBox').classList.remove('visible');
  document.getElementById('loadingIcon').textContent = '📖';
  document.getElementById('loadingText').textContent = '말씀을 묵상하고 있어요...';
  document.getElementById('loadingAnim').classList.add('visible');

  var payload = {
    mode: 'meditation',
    input_text: '오늘의 말씀: ' + verseLabel,
    book: book,
    chapter: parseInt(ch),
    verse_start: parseInt(vStart),
    verse_end: vEnd ? parseInt(vEnd) : parseInt(vStart)
  };

  try {
    var resp = await fetch(MEDITATION_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    var data = await resp.json();
    var resultText = extractResultText(data);

    document.getElementById('resultTitle').textContent = '📖 ' + verseLabel;
    document.getElementById('resultContent').innerHTML = formatResult(resultText);
    document.getElementById('resultBox').classList.add('visible');
    document.getElementById('statusBar').className = 'status-bar';
    saveToHistory('meditation', verseLabel, resultText);
  } catch (err) {
    setStatus('error', '전송 실패: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '묵상 시작하기';
    document.getElementById('loadingAnim').classList.remove('visible');
  }
}

// ═══════ Submit Prayer ═══════
async function submitPrayer() {
  var topic = document.getElementById('prayerTopic').value.trim();
  if (!topic) { setStatus('error', '기도 주제를 입력해주세요'); return; }

  var btn = document.getElementById('prayerBtn');
  btn.disabled = true;
  btn.textContent = '말씀을 찾고 있어요...';
  setStatus('', '');
  document.getElementById('resultBox').classList.remove('visible');
  document.getElementById('loadingIcon').textContent = '🙏';
  document.getElementById('loadingText').textContent = '성경에서 기도 근거를 찾고 있어요...';
  document.getElementById('loadingAnim').classList.add('visible');

  var payload = { mode: 'prayer', input_text: topic };

  try {
    var resp = await fetch(PRAYER_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    var data = await resp.json();
    var resultText = extractResultText(data);

    document.getElementById('resultTitle').textContent = '🙏 기도 근거 — ' + (topic.length > 20 ? topic.substring(0, 20) + '...' : topic);
    document.getElementById('resultContent').innerHTML = formatResult(resultText);
    document.getElementById('resultBox').classList.add('visible');
    document.getElementById('statusBar').className = 'status-bar';
    saveToHistory('prayer', topic.length > 30 ? topic.substring(0, 30) + '...' : topic, resultText);
  } catch (err) {
    setStatus('error', '전송 실패: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '기도 근거 찾기';
    document.getElementById('loadingAnim').classList.remove('visible');
  }
}

// ═══════ Extract Result ═══════
function extractResultText(data) {
  if (Array.isArray(data)) {
    var item = data[0];
    if (item.choices) return item.choices[0].message.content;
    if (item.content && Array.isArray(item.content)) return item.content.map(function(c) { return c.text || ''; }).join('\n');
    return JSON.stringify(item, null, 2);
  }
  if (data.choices) return data.choices[0].message.content;
  if (data.content) {
    if (typeof data.content === 'string') return data.content;
    return data.content.map(function(c) { return c.text || ''; }).join('\n');
  }
  return JSON.stringify(data, null, 2);
}

// ═══════ History ═══════
function saveToHistory(type, label, text) {
  var history = JSON.parse(localStorage.getItem('bible_history') || '[]');
  var summary = text.replace(/\*\*/g, '').substring(0, 80);
  history.unshift({ type: type, label: label, summary: summary, fullText: text, date: new Date().toISOString() });
  if (history.length > 100) history = history.slice(0, 100);
  localStorage.setItem('bible_history', JSON.stringify(history));
  currentPage = 1;
  renderTimeline();
}

function renderTimeline() {
  var history = JSON.parse(localStorage.getItem('bible_history') || '[]');
  var section = document.getElementById('timelineSection');
  var list = document.getElementById('timelineList');
  list.innerHTML = '';

  if (history.length === 0) {
    list.innerHTML = '<div class="timeline-empty">아직 기록이 없어요</div>';
    section.style.display = 'block';
    return;
  }

  var totalPages = Math.ceil(history.length / PAGE_SIZE);
  if (currentPage > totalPages) currentPage = totalPages;
  if (currentPage < 1) currentPage = 1;

  var startIdx = (currentPage - 1) * PAGE_SIZE;
  var endIdx = Math.min(startIdx + PAGE_SIZE, history.length);
  var pageItems = history.slice(startIdx, endIdx);

  pageItems.forEach(function(item, i) {
    var globalIdx = startIdx + i;
    var d = new Date(item.date);
    var dateStr = (d.getMonth()+1) + '/' + d.getDate();
    var typeLabel = item.type === 'prayer' ? '기도' : '묵상';
    var typeClass = item.type === 'prayer' ? 'prayer' : 'meditation';

    var li = document.createElement('li');
    li.className = 'timeline-item';
    li.onclick = function() { showHistoryItem(globalIdx); };
    li.innerHTML =
      '<div class="timeline-dot"></div>' +
      '<div class="timeline-body">' +
        '<div class="timeline-verse">' + item.label +
          '<span class="timeline-type ' + typeClass + '">' + typeLabel + '</span>' +
        '</div>' +
        '<div class="timeline-summary">' + item.summary + '</div>' +
      '</div>' +
      '<div class="timeline-date">' + dateStr + '</div>';
    list.appendChild(li);
  });

  if (totalPages > 1) {
    var pagDiv = document.createElement('div');
    pagDiv.className = 'pagination';
    if (currentPage > 1) {
      var prevBtn = document.createElement('button');
      prevBtn.className = 'page-btn nav'; prevBtn.textContent = '‹';
      prevBtn.onclick = function(e) { e.stopPropagation(); currentPage--; renderTimeline(); };
      pagDiv.appendChild(prevBtn);
    }
    for (var p = 1; p <= totalPages; p++) {
      var pb = document.createElement('button');
      pb.className = 'page-btn' + (p === currentPage ? ' active' : '');
      pb.textContent = p;
      pb.onclick = (function(page) {
        return function(e) { e.stopPropagation(); currentPage = page; renderTimeline(); };
      })(p);
      pagDiv.appendChild(pb);
    }
    if (currentPage < totalPages) {
      var nextBtn = document.createElement('button');
      nextBtn.className = 'page-btn nav'; nextBtn.textContent = '›';
      nextBtn.onclick = function(e) { e.stopPropagation(); currentPage++; renderTimeline(); };
      pagDiv.appendChild(nextBtn);
    }
    list.appendChild(pagDiv);
  }

  var clearDiv = document.createElement('div');
  clearDiv.className = 'timeline-clear';
  var clearBtn = document.createElement('button');
  clearBtn.className = 'timeline-clear-btn';
  clearBtn.textContent = '기록 전체 삭제';
  clearBtn.addEventListener('click', function() { clearHistory(); });
  clearDiv.appendChild(clearBtn);
  list.appendChild(clearDiv);

  section.style.display = 'block';
}

function showHistoryItem(idx) {
  var history = JSON.parse(localStorage.getItem('bible_history') || '[]');
  var item = history[idx];
  if (!item) return;
  var icon = item.type === 'prayer' ? '🙏' : '📖';
  document.getElementById('resultTitle').textContent = icon + ' ' + item.label;
  document.getElementById('resultContent').innerHTML = formatResult(item.fullText);
  document.getElementById('resultBox').classList.add('visible');
  document.getElementById('backBtn').classList.add('visible');
  document.getElementById('inputArea').style.display = 'none';
  document.getElementById('timelineSection').style.display = 'none';
  document.querySelector('.mode-tabs').style.display = 'none';
}

function goBack() {
  document.getElementById('resultBox').classList.remove('visible');
  document.getElementById('backBtn').classList.remove('visible');
  document.getElementById('inputArea').style.display = 'block';
  document.getElementById('timelineSection').style.display = 'block';
  document.querySelector('.mode-tabs').style.display = 'flex';
}

function clearHistory() {
  if (confirm('기록을 전부 삭제할까요?')) {
    localStorage.removeItem('bible_history');
    currentPage = 1;
    renderTimeline();
  }
}

// ═══════ Copy / Share ═══════
function copyResult() {
  var text = document.getElementById('resultContent').innerText;
  var btn = document.getElementById('copyBtn');
  navigator.clipboard.writeText(text).then(function() {
    btn.textContent = '✅ 복사됨!';
    setTimeout(function() { btn.textContent = '📋 복사하기'; }, 1500);
  });
}

function shareResult() {
  var text = document.getElementById('resultContent').innerText;
  var title = document.getElementById('resultTitle').textContent;
  if (navigator.share) {
    navigator.share({ title: title, text: text });
  } else {
    copyResult();
  }
}

showDate();
populateBooks('ot');
renderTimeline();

document.getElementById('tabMeditation').addEventListener('click', function() { switchMode('meditation'); });
document.getElementById('tabPrayer').addEventListener('click', function() { switchMode('prayer'); });

document.getElementById('tabNT').addEventListener('click', function() { switchTestament('nt'); });
document.getElementById('meditationBtn').addEventListener('click', function() { submitMeditation(); });
document.getElementById('prayerBtn').addEventListener('click', function() { submitPrayer(); });
document.getElementById('backBtn').addEventListener('click', function() { goBack(); });
document.getElementById('copyBtn').addEventListener('click', function() { copyResult(); });
document.getElementById('shareBtn').addEventListener('click', function() { shareResult(); });
</script>
