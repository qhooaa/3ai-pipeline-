<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3-AI Sequential Pipeline v11.1</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }
        .container {
            max-width: 720px;
            width: 100%;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #fff;
        }
        .subtitle {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 32px;
        }
        .field {
            margin-bottom: 24px;
        }
        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: #aaa;
            margin-bottom: 8px;
        }
        textarea {
            width: 100%;
            min-height: 140px;
            padding: 14px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 0.95rem;
            line-height: 1.6;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
        }
        textarea:focus { border-color: #666; }
        .file-upload {
            border: 2px dashed #333;
            border-radius: 8px;
            padding: 28px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: #111;
        }
        .file-upload:hover { border-color: #555; background: #1a1a1a; }
        .file-upload.has-file { border-color: #4a9eff; background: #0d1b2a; }
        .file-upload input { display: none; }
        .file-upload .icon { font-size: 1.5rem; margin-bottom: 8px; }
        .file-upload .text { font-size: 0.85rem; color: #888; }
        .file-upload .filename { font-size: 0.9rem; color: #4a9eff; font-weight: 500; }
        .file-upload .remove { font-size: 0.8rem; color: #ff6b6b; cursor: pointer; margin-top: 6px; }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .submit-btn:hover { background: #e0e0e0; }
        .submit-btn:disabled { background: #333; color: #666; cursor: not-allowed; }
        .status {
            margin-top: 16px;
            padding: 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            display: none;
        }
        .status.loading { display: block; background: #1a1a2e; color: #7c83ff; }
        .status.success { display: block; background: #0d2818; color: #4ade80; }
        .status.error { display: block; background: #2d0a0a; color: #ff6b6b; }
        .result {
            margin-top: 24px;
            padding: 20px;
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            white-space: pre-wrap;
            font-size: 0.85rem;
            line-height: 1.7;
            max-height: 600px;
            overflow-y: auto;
            display: none;
        }
        .mode-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 500;
            background: #1a1a2e;
            color: #7c83ff;
            margin-bottom: 8px;
        }
        .info {
            font-size: 0.8rem;
            color: #555;
            margin-top: 6px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>3-AI Sequential Pipeline</h1>
        <p class="subtitle">Claude → GPT → Claude → GPT → Claude → Gemini × 2서클</p>

        <div class="field">
            <label>질문 / 지시사항</label>
            <textarea id="question" placeholder="분석하고 싶은 상황, 질문, 또는 검토 지시사항을 입력하세요.&#10;파일과 함께 질문을 넣으면 자료 기반으로 분석합니다."></textarea>
        </div>

        <div class="field">
            <label>파일 첨부 (선택)</label>
            <div class="file-upload" id="fileUpload" onclick="document.getElementById('fileInput').click()">
                <input type="file" id="fileInput" accept=".docx,.pdf,.txt,.md" onchange="handleFile(event)">
                <div class="icon">📄</div>
                <div class="text">클릭 또는 드래그하여 파일 업로드 (.docx, .pdf, .txt, .md / 10MB 이하)</div>
            </div>
            <p class="info">파일 또는 질문 중 최소 하나는 입력해야 합니다.</p>
        </div>

        <button class="submit-btn" id="submitBtn" onclick="submit()">분석 시작</button>

        <div class="status" id="status"></div>
        <div class="result" id="result"></div>
    </div>

    <script>
        // ===== CONFIG =====
        const WEBHOOK_URL = 'https://kimbombo.app.n8n.cloud/webhook/3ai-sequential-v2';
        
        let fileData = null;
        let fileName = '';
        let fileType = '';

        function handleFile(e) {
            const file = e.target.files[0];
            if (!file) return;
            if (file.size > 10 * 1024 * 1024) {
                alert('파일 크기가 10MB를 초과합니다.');
                return;
            }
            fileName = file.name;
            fileType = file.type || file.name.split('.').pop();
            
            const reader = new FileReader();
            reader.onload = function(ev) {
                fileData = ev.target.result.split(',')[1]; // base64
                const upload = document.getElementById('fileUpload');
                upload.classList.add('has-file');
                upload.innerHTML = `
                    <div class="filename">📎 ${fileName}</div>
                    <div class="remove" onclick="removeFile(event)">✕ 파일 제거</div>
                `;
            };
            reader.readAsDataURL(file);
        }

        function removeFile(e) {
            e.stopPropagation();
            fileData = null;
            fileName = '';
            fileType = '';
            const upload = document.getElementById('fileUpload');
            upload.classList.remove('has-file');
            upload.innerHTML = `
                <input type="file" id="fileInput" accept=".docx,.pdf,.txt,.md" onchange="handleFile(event)">
                <div class="icon">📄</div>
                <div class="text">클릭 또는 드래그하여 파일 업로드 (.docx, .pdf, .txt, .md / 10MB 이하)</div>
            `;
        }

        async function submit() {
            const question = document.getElementById('question').value.trim();
            if (!question && !fileData) {
                alert('질문 또는 파일 중 최소 하나를 입력하세요.');
                return;
            }

            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('status');
            const result = document.getElementById('result');

            btn.disabled = true;
            btn.textContent = '전송 중...';
            status.className = 'status loading';
            status.textContent = '⏳ 전송 중...';
            status.style.display = 'block';
            result.style.display = 'none';

            try {
                const payload = {
                    question: question,
                    file_data: fileData || '',
                    file_name: fileName || '',
                    file_type: fileType || ''
                };

                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                status.className = 'status success';
                status.innerHTML = '✅ <strong>접수 완료</strong><br>12단계 AI 분석이 백그라운드에서 진행됩니다 (약 3~5분).<br>완료되면 이메일로 결과가 전달됩니다.';

                // 입력 초기화
                document.getElementById('question').value = '';
                if (fileData) removeFile(new Event('click'));

            } catch (err) {
                status.className = 'status error';
                status.textContent = '❌ 전송 실패: ' + err.message;
            } finally {
                btn.disabled = false;
                btn.textContent = '분석 시작';
            }
        }

        // Drag and drop
        const dropZone = document.getElementById('fileUpload');
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.borderColor = '#4a9eff'; });
        dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = '#333'; });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#333';
            const file = e.dataTransfer.files[0];
            if (file) {
                const input = document.getElementById('fileInput');
                const dt = new DataTransfer();
                dt.items.add(file);
                input.files = dt.files;
                handleFile({ target: input });
            }
        });
    </script>
</body>
</html>
